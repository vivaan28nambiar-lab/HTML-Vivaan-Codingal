<!DOCTYPE html>
<html>
    <head>
        <title>Typography</title>
        <meta charset="utf-8">
        <meta name="viewport"
        contents="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    </head>

    <body>

        <div class="container">
            <h1>Heading Lists</h1>
            <h1 class="display-1">Codingal</h1>
            <h1 class="display-2">Codingal</h1>
            <h1 class="display-3">Codingal</h1>
            <h1 class="display-4">Codingal</h1>
            <h1 class="display-5">Codingal</h1>
            <h1 class="display-6">Codingal</h1>
        </div>
        <div class="container">
            <h1>Lighter,Secondary Text with small class and text-muted
                <small class="text-muted">Hello Codingal</small>
            </h1>

            <dl>
                <dt>Coffee</dt>
                <dd>White hot drink</dd>
            </dl>
            </div>
    </body>
</html>
