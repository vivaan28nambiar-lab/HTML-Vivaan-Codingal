<!DOCTYPE html>
<html>
    <head>
        <style>
        div {
            right : 30px;
            border : 3px solid #73AD21;
        }
        div.absolute {
            position : absolute;
            left : 50px;
            border : 3px solid blue;
        }
        div.relative {
            position : relative;
            left : 100px;
            border :  3px solid #73AD21;
        }
        div.fixed {
            position : fixed;
            top : 0px;
            right : 20px;
            width : 300px;
            border : 3px solid #73AD21;
        }
        div.sticky {
            position : sticky;
            top : 1px;
            left : 20px;
            width : 100px;
            border : 3px solid #73AD21;
        }
        </style>
    </head>

    <body>

    <div class="relative">
        This div element has position : relative

        Absolute class DIV

    </div>
